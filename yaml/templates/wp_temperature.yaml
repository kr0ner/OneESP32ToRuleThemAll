defaults:
  update_interval: $interval_very_slow
  target: "Kessel"
  writable: "false"
  name_suffix: ""
  unit: "°C"
  exposed: "true"

sensor:
  - platform: template
    name: ${property}${name_suffix}
    id: ${property}${name_suffix}
    unit_of_measurement: ${unit}
    icon: "mdi:thermometer-lines"
    device_class: "temperature"
    state_class: "measurement"
    accuracy_decimals: 1
    update_interval: ${update_interval}
    lambda: |-
        queueRequest(CanNode::${target}, Property::k${property});
        return {};

esphome:
  on_boot:
    - priority: -50
      then:
        - lambda: |-
            auto callback= [](const SimpleVariant& value){
                const auto newValue{value.get<float>()};
                auto property{id(${property}${name_suffix})};
                if(!std::is_eq(property->state <=> newValue)) {
                  property->publish_state(newValue);
                }
            };

            CallbackHandler::instance().addCallback({CanNode::${target},Property::k${property}},callback);
            if constexpr(${writable}) {
              CallbackHandler::instance().addCallback({CanNode::Heizmodul,Property::k${property}},callback);
            }

            #if defined(ANALYTICS)
              if(${exposed}) {
                getWhitelistedEntities().insert(id(${property}${name_suffix}));
              }
            #endif
    - priority: -100.0
      then:
        - delay: 250ms
        - lambda: |-
            queueRequest(CanNode::${target}, Property::k${property});
