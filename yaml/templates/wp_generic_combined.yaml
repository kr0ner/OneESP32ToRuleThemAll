defaults:
  target: "Kessel"
  scaler: "0.001"
  update_interval: $interval_very_slow
  exposed: "true"
  state_class: "measurement"

sensor:
  - platform: template
    name: ${scaled_property}
    id: ${scaled_property}
    state_class: ${state_class}
    accuracy_decimals: 3
    internal: true
    update_interval: ${update_interval}
    filters:
      - multiply: ${scaler}
    lambda: |-
        queueRequest(CanNode::${target}, Property::k${scaled_property});
        return {};
      
  - platform: template
    name: ${sensor_name}
    id: ${sensor_name}
    unit_of_measurement: ${unit}
    icon: ${icon}
    accuracy_decimals: ${accuracy_decimals}
    update_interval: ${update_interval}
    state_class: "total_increasing"
    lambda: |-
        queueRequest(CanNode::${target}, Property::k${property});
        return {};

esphome:
  on_boot:
    - priority: -50
      then:
        - lambda: |-
            // Handle the values received from the heat pump. Scaled property value is just stored in an internal sensor and published together with the property value on reception.
            CallbackHandler::instance().addCallback({CanNode::${target},Property::k${scaled_property}},[](const SimpleVariant& value){
              id(${scaled_property}).publish_state(value.get<std::uint16_t>());
            });
            CallbackHandler::instance().addCallback({CanNode::${target},Property::k${property}},[](const SimpleVariant& value){
              const auto newValue{value.get<std::uint16_t>() + id(${scaled_property}).state};
              auto property{id(${sensor_name})};
              if(!std::is_eq(property->state <=> newValue)) {
                property->publish_state(newValue);
              }
            });

            #if defined(ANALYTICS)
              if(${exposed}) {
                getWhitelistedEntities().insert(id(${sensor_name}));
              }
            #endif
    - priority: -100.0
      then:
        - delay: 250ms
        - lambda: |-
            // initial queueing of the values
            queueRequest(CanNode::${target}, Property::k${scaled_property});
            queueRequest(CanNode::${target}, Property::k${property});
