defaults:
  icon: "mdi:lightning-bolt"
  accuracy_decimals: "2"
  target: "Kessel"
  exposed: "true"

globals:
  - id: gOFFSET_${property_wh}
    type: float
    restore_value: yes
    initial_value: "0.0"

sensor:
  - platform: template
    name: ${property_wh}
    id: ${property_wh}
    state_class: "measurement"
    accuracy_decimals: 3
    internal: true
    update_interval: never
    filters:
      - multiply: 0.001
      - lambda: |-
          return x - id(gOFFSET_${property_wh});

  - platform: template
    name: ${sensor_name}
    id: ${sensor_name}
    unit_of_measurement: "kWh"
    icon: ${icon}
    accuracy_decimals: ${accuracy_decimals}
    device_class: energy
    state_class: total_increasing
    update_interval: never

esphome:
  on_boot:
    - priority: -50
      then:
        - lambda: |-
            // Handle the values received from the heat pump. Wh value is just stored in an internal sensor and published together with the kWh value on reception.
            CallbackHandler::instance().addCallback({CanNode::${target},Property::k${property_wh}},[](const SimpleVariant& value){
              id(${property_wh}).publish_state(value.get<std::uint16_t>());
            });
            CallbackHandler::instance().addCallback({CanNode::${target},Property::k${property_kwh}},[](const SimpleVariant& value){
              const auto newValue{value.get<std::uint16_t>() + id(${property_wh}).state};
              auto property{id(${sensor_name})};
              if(!std::is_eq(property->state <=> newValue)) {
                property->publish_state(newValue);
              }
            });

            #if defined(ANALYTICS)
              if(${exposed}) {
                getWhitelistedEntities().insert(id(${sensor_name}));
              }
            #endif
    - priority: -100.0 
      then:
        - delay: 250ms
        - lambda: |-
            // initial queueing of the Wh and kWh value
            queueRequest(CanNode::${target}, Property::k${property_wh});
            queueRequest(CanNode::${target}, Property::k${property_kwh});

time:
  - platform: homeassistant
    id: !extend homeassistant_time
    on_time:
      # Every hour, every 5 minutes starting at 4th minute.
      - seconds: 0
        minutes: 4/5
        then:
          - lambda: |-
              queueRequest(CanNode::${target}, Property::k${property_wh});
              queueRequest(CanNode::${target}, Property::k${property_kwh});
      # At midnight reset power consumptions. And save offset for the next day.
      - seconds: 0
        minutes: 0
        hours: 0
        then:
          - lambda: |-
              // set the current Wh value as offset for the next day and convert Wh to kWh
              id(gOFFSET_${property_wh}) = id(${property_wh}).get_raw_state() * 0.001;
          - sensor.template.publish:
              id: ${sensor_name}
              state: 0.0
