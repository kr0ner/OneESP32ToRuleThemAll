esphome:
  on_boot:
    - priority: -50
      then:
        - lambda: |-
            id(HEATPUMP_DATETIME).state = "2024-01-01 12:34";
            auto updateTime = [](auto&& updateTimeFragment){
                ESPTime timeToSet{};
                // get the datetime as string and parse to ESPTime object
                if(const auto success = ESPTime::strptime(id(HEATPUMP_DATETIME).state, timeToSet); !success) {
                  ESP_LOGE("DATETIME", "Error parsing datetime string %s", id(HEATPUMP_DATETIME).state.c_str());
                  return;
                }
                // update the part that belongs to this sensor
                updateTimeFragment(timeToSet);
                // convert the time back to string and directly save it to the state of the datetime sensor
                char buf[20];
                timeToSet.strftime(buf, sizeof(buf), "%Y-%m-%d %H:%M");
                // publish the value
                id(HEATPUMP_DATETIME).state = std::string(buf);
            };
            CallbackHandler::instance().addCallback({CanNode::Kessel,Property::kJAHR},[updateTime](const SimpleVariant& value){
              updateTime([&value](ESPTime& timeToSet){
                timeToSet.year = 2000U + static_cast<std::uint16_t>(value);
              });
            });
            CallbackHandler::instance().addCallback({CanNode::Kessel,Property::kMONAT},[updateTime](const SimpleVariant& value){
              updateTime([&value](ESPTime& timeToSet){
                timeToSet.month = static_cast<std::uint16_t>(value);
              });
            });
            CallbackHandler::instance().addCallback({CanNode::Kessel,Property::kWOCHENTAG},[](const SimpleVariant&){});
            CallbackHandler::instance().addCallback({CanNode::Kessel,Property::kTAG},[updateTime](const SimpleVariant& value){
              updateTime([&value](ESPTime& timeToSet){
                timeToSet.day_of_month = static_cast<std::uint16_t>(value);
              });
            });
            CallbackHandler::instance().addCallback({CanNode::Kessel,Property::kSTUNDE},[updateTime](const SimpleVariant& value){
              updateTime([&value](ESPTime& timeToSet){
                timeToSet.hour = static_cast<std::uint16_t>(value);
              });
            });
            CallbackHandler::instance().addCallback({CanNode::Kessel,Property::kMINUTE},[updateTime](const SimpleVariant& value){
              updateTime([&value](ESPTime& timeToSet){
                timeToSet.minute = static_cast<std::uint16_t>(value);
              });
              id(HEATPUMP_DATETIME).publish_state(id(HEATPUMP_DATETIME).state);
            });
    - priority: -100.0
      then:
        - delay: 250ms
        - lambda: |-
            queueRequest(CanNode::Kessel, Property::kJAHR);
            queueRequest(CanNode::Kessel, Property::kMONAT);
            queueRequest(CanNode::Kessel, Property::kTAG);
            queueRequest(CanNode::Kessel, Property::kSTUNDE);
            queueRequest(CanNode::Kessel, Property::kMINUTE);

text_sensor:
  - platform: template
    name: "HEATPUMP_DATETIME"
    id: HEATPUMP_DATETIME
    update_interval: never
