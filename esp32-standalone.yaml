#########################################
#                                       #
#   CAN configuration                   #
#                                       #
#########################################
# Using MCP2515
#canbus:
#  - id: !extend wp_can
#    platform: mcp2515
#    spi_id: McpSpi
#    cs_pin: GPIO15
#    bit_rate: 20kbps
#    clock: 8MHz        # 8MHz or 16MHz depending on the value of the crystal on your MCP2515
#    data_rate: 4MHz    # 8Mhz (4MHz, 2MHz or 1MHz in case you get CAN bus errors)

# Waveshare Industrial ESP32-S3 Control Board
canbus:
  - id: !extend wp_can
    platform: esp32_can
    tx_pin: GPIO15
    rx_pin: GPIO16
    bit_rate: 20kbps
    rx_queue_len: 512  # Default: 8, increased for high-traffic CAN bus
    tx_queue_len: 64   # Default: 16, increased for burst writes

#########################################
#                                       #
#   Buttons                             #
#                                       #
#########################################
button:
  - platform: restart
    name: "Restart ESP32-Standalone"

#########################################
#                                       #
#   WiFi Configuration                  #
#                                       #
#########################################
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "ESP32-Standalone Fallback AP"
    password: !secret fallback_password

