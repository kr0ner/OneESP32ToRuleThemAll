esphome:
  name: esp32-standalone
  friendly_name: ESP32-Standalone

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

# Enable logging
logger:
  level: VERBOSE
  initial_level: INFO
  baud_rate: 0
  hardware_uart: UART1
select:
  - platform: logger
    name: "Log level"

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key

captive_portal:

ota:
  platform: esphome
  password: !secret ota_password

substitutions:
  entity_room_temperature: "sensor.durchschnittstemperatur_haus_ohne_keller"
  entity_humidity: "sensor.durchschnitt_luftfeuchtigkeit_haus"
  timezone: "Europe/Berlin"

external_components:
  - source:
      type: git
      url: https://github.com/kr0ner/OneESP32ToRuleThemAll
      ref: master
    components: ["wp_core", "wp_climate", "sml_reader"]

#########################################
